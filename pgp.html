<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PGP Mode</title>
  <style>
    :root {
      --bg: #070b14;
      --bg2: #0d1526;
      --card: rgba(17, 27, 46, 0.85);
      --edge: rgba(99, 179, 255, 0.28);
      --text: #e8f3ff;
      --muted: #9fb5cc;
      --ok: #34d399;
      --bad: #fb7185;
      --info: #60a5fa;
      --warn: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 500px at 10% -20%, #123 0%, transparent 50%),
                  radial-gradient(800px 400px at 100% 0%, #112344 0%, transparent 55%),
                  linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      width: min(860px, 96vw);
      border: 1px solid var(--edge);
      border-radius: 22px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      overflow: hidden;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(8,14,26,.7);
    }
    .title { font-weight: 800; letter-spacing: .3px; }
    .muted { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px;
    }
    .card {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
      background: rgba(7, 12, 24, .5);
    }
    .card h3 { margin: 0 0 10px; font-size: 14px; color: #cce3ff; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    button, a.btn {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:hover, a.btn:hover { filter: brightness(1.1); }
    .ok { border-color: rgba(52,211,153,.45); }
    .bad { border-color: rgba(251,113,133,.45); }
    .info { border-color: rgba(96,165,250,.45); }
    .warn { border-color: rgba(251,191,36,.45); }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }
    .log {
      max-height: 220px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      background: rgba(0,0,0,.22);
      white-space: pre-wrap;
    }
    @media (max-width: 760px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">🛰️ PGP MODE HOME</div>
        <div class="muted">Dedicated spin/catch simulator (separate from Pokégatchi)</div>
      </div>
      <a class="btn" href="index.html">← Back to Pokégatchi</a>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Outcomes</h3>
        <div class="row">
          <button class="ok" onclick="emit('catch_success')">✅ Catch Success</button>
          <button class="bad" onclick="emit('catch_fail')">❌ Catch Fail</button>
          <button class="info" onclick="emit('spin_success')">💠 Spin Success</button>
          <button class="warn" onclick="emit('spin_fail')">⛔ Spin Fail</button>
        </div>
        <div class="status" id="status">Ready</div>
      </div>

      <div class="card">
        <h3>Display/Device</h3>
        <div class="row">
          <button id="sleepBtn" onclick="toggleSleep()">🌙 Watch Sleep: OFF</button>
          <button id="vibBtn" onclick="toggleVib()">📳 Vibrate: ON</button>
          <button id="fxBtn" onclick="toggleFx()">✨ Screen FX: ON</button>
        </div>
      </div>

      <div class="card" style="grid-column:1/-1;">
        <h3>Live Event Log</h3>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <script>
    const S = { sleep:false, vibrate:true, fx:true };
    const log = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const ts = ()=> new Date().toLocaleTimeString();
    function line(t){ log.textContent = `[${ts()}] ${t}\n` + log.textContent; }

    function syncButtons(){
      document.getElementById('sleepBtn').textContent = `🌙 Watch Sleep: ${S.sleep?'ON':'OFF'}`;
      document.getElementById('vibBtn').textContent = `📳 Vibrate: ${S.vibrate?'ON':'OFF'}`;
      document.getElementById('fxBtn').textContent = `✨ Screen FX: ${S.fx?'ON':'OFF'}`;
    }
    function toggleSleep(){ S.sleep=!S.sleep; syncButtons(); line(`watch_sleep=${S.sleep}`); }
    function toggleVib(){ S.vibrate=!S.vibrate; syncButtons(); line(`vibrate=${S.vibrate}`); }
    function toggleFx(){ S.fx=!S.fx; syncButtons(); line(`screen_fx=${S.fx}`); }

    function emit(kind){
      const fxAllowed = S.fx && !S.sleep;
      const vib = S.vibrate ? 'vibrate:on' : 'vibrate:off';
      const fx = fxAllowed ? 'fx:on' : 'fx:off';
      statusEl.textContent = `${kind} • ${vib} • ${fx}`;
      line(`${kind} | ${vib} | ${fx}`);
      try {
        localStorage.setItem('pg_mode_pgp', 'true');
        localStorage.setItem('pg_watch_sleep', String(S.sleep));
        localStorage.setItem('pg_vibrate', String(S.vibrate));
        localStorage.setItem('pg_screen_effects', String(S.fx));
      } catch(e) {}
    }
    syncButtons();
    line('PGP home ready');
  </script>
</body>
</html>
