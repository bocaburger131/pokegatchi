<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pokégatchi</title>
<link rel="stylesheet" href="assets/styles.css?v=4">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ─── SCENE ─── -->
<div class="scene-wrap" id="sceneWrap">
  <div class="sky-layer" id="skyLayer"></div>
  <div class="ground-layer"></div>
  <div class="scene-path"></div>
  <div class="scene-mountain" style="left:5%;border-bottom-color:rgba(50,40,70,0.2);"></div>
  <div class="scene-mountain" style="right:10%;border-left-width:100px;border-right-width:100px;border-bottom-width:70px;border-bottom-color:rgba(60,50,80,0.15);"></div>
  <div class="cameo-pkmn cameo-left" style="background-image:url('assets/sprites/eevee.png');"></div>
  <div class="cameo-pkmn cameo-right" style="background-image:url('assets/sprites/pikachu.png');"></div>
  <div class="cameo-pkmn cameo-center-right" style="background-image:url('assets/sprites/bulbasaur.png');"></div>
  <div class="scene-cloud" style="width:80px;height:30px;top:15%;left:-10%;--dur:80s;"></div>
  <div class="scene-cloud" style="width:100px;height:25px;top:25%;left:-20%;--dur:110s;opacity:0.7;"></div>
</div>

<!-- ─── UI ─── -->
<div class="ui-layer">

  <!-- ─── TOP BAR ─── -->
  <div class="top-bar">
    <span class="logo">✦ PG</span>
    <span class="top-icon-btn" onclick="window.toggleDebugOverlay()" id="debugToggle" title="Debug overlay">🔍</span>
    <span class="top-icon-btn" onclick="window.openJournal()" title="Activity Journal">📓</span>
    <a class="top-icon-btn" href="pgp.html" title="Open PGP Home" style="text-decoration:none;">🛰️</a>
    <span class="top-icon-btn" onclick="window.openSettings()" title="Settings">⚙️</span>
    <span class="pet-name" id="petNameDisplay">Squirtle</span>
    <span class="spacer">
      <!-- HUD COUNTERS -->
      <span class="hud-group" data-store-key="steps">
        <span class="hud-icon">👟</span>
        <span class="hud-val" id="hudSteps">0</span>
      </span>
      <span class="hud-group" data-store-key="pokemonCaught">
        <span class="hud-icon">⚡</span>
        <span class="hud-val" id="hudCaught">12</span>
      </span>
      <span class="hud-group" data-store-key="pokestopSpins">
        <span class="hud-icon">💠</span>
        <span class="hud-val" id="hudSpins">7</span>
      </span>
      <span class="hud-group" data-store-key="badges">
        <span class="hud-icon">🏅</span>
        <span class="hud-val" id="hudBadges">3</span>
      </span>
    </span>
  </div>

  <!-- ─── PET CARD ─── -->
  <div class="pet-card">
    <div class="name" id="petName">Squirtle</div>
    <div class="species" id="petSpecies">Showing squirtle · Pokégatchi • awake</div>
    <div class="pet-canvas-wrap" id="petWrap">
      <div id="pet3dContainer"></div>
      <canvas id="expressionCanvas" width="320" height="320"></canvas>
      <div class="sprite-glow" id="spriteGlow"></div>
    </div>

    <!-- POKÉMON PICKER -->
    <div class="picker-section">
      <div class="picker-label">Choose your Pokémon</div>
      <div class="picker-grid" id="pickerGrid">
        <button class="pick-btn" data-species="pikachu" onclick="window.selectSpecies('pikachu')">⚡ Pikachu</button>
        <button class="pick-btn" data-species="eevee" onclick="window.selectSpecies('eevee')">💫 Eevee</button>
        <button class="pick-btn" data-species="charmander" onclick="window.selectSpecies('charmander')">🔥 Charmander</button>
        <button class="pick-btn" data-species="bulbasaur" onclick="window.selectSpecies('bulbasaur')">🌿 Bulbasaur</button>
        <button class="pick-btn" data-species="squirtle" onclick="window.selectSpecies('squirtle')">💧 Squirtle</button>
        <button class="pick-btn" data-species="psyduck" onclick="window.selectSpecies('psyduck')">🟡 Psyduck</button>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-sections">
      <!-- Row 1: Interactions -->
      <div id="pokegatchiActions">
        <div class="action-group-label">Pokégatchi Interactions</div>
        <div class="action-row" id="petActionsRow">
          <button onclick="window.feed()"><span class="btn-icon">🫐</span><span class="btn-label">Feed</span></button>
          <button onclick="window.petAction()"><span class="btn-icon">🫳</span><span class="btn-label">Pet</span></button>
          <button onclick="window.healPet()"><span class="btn-icon">💊</span><span class="btn-label">Heal</span></button>
          <button onclick="window.bounce()" class="primary"><span class="btn-icon">🌟</span><span class="btn-label">Bounce</span></button>
        </div>
        <div class="action-row" id="emoteActionsRow" style="margin-top:6px;">
          <button onclick="window.emoteEat()"><span class="btn-icon">🍽️</span><span class="btn-label">Emote Eat</span></button>
          <button onclick="window.emoteSad()"><span class="btn-icon">😢</span><span class="btn-label">Emote Sad</span></button>
        </div>
      </div>
      <div id="pgpActions" style="display:none;">
        <div class="action-group-label">PGP Samples (Spin/Catch)</div>
        <div class="action-row">
          <button onclick="window.pgpSample('catch_success')" class="primary"><span class="btn-icon">✅</span><span class="btn-label">Catch Success</span></button>
          <button onclick="window.pgpSample('catch_fail')"><span class="btn-icon">❌</span><span class="btn-label">Catch Fail</span></button>
        </div>
        <div class="action-row" style="margin-top:6px;">
          <button onclick="window.pgpSample('spin_success')" class="primary"><span class="btn-icon">💠</span><span class="btn-label">Spin Success</span></button>
          <button onclick="window.pgpSample('spin_fail')"><span class="btn-icon">⛔</span><span class="btn-label">Spin Fail</span></button>
        </div>
      </div>
      <!-- Row 2: Bag -->
      <div>
        <div class="action-group-label">Inventory</div>
        <div class="action-row">
          <button onclick="window.openBag()" class="primary"><span class="btn-icon">🎒</span><span class="btn-label">Open Bag</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── STAT INDICATORS ─── -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-row">
      <span class="si">🍽</span>
      <span class="sn">Hunger</span>
      <div class="stat-bar-bg"><div class="stat-fill" id="barHunger" style="width:80%;background:var(--accent);"></div></div>
      <span class="sv" id="valHunger" data-store-key="hunger">80</span>
    </div>
    <div class="stat-row">
      <span class="si">😊</span>
      <span class="sn">Happy</span>
      <div class="stat-bar-bg"><div class="stat-fill" id="barHappiness" style="width:60%;background:var(--accent);"></div></div>
      <span class="sv" id="valHappiness" data-store-key="happiness">60</span>
    </div>
    <div class="stat-row">
      <span class="si">💕</span>
      <span class="sn">Affect</span>
      <div class="stat-bar-bg"><div class="stat-fill" id="barAffection" style="width:50%;background:var(--accent);"></div></div>
      <span class="sv" id="valAffection" data-store-key="affection">50</span>
    </div>
  </div>

  <!-- ─── BAG SECTION (collapsible) ─── -->
  <div class="collapsible-section" id="bagSection">
    <div class="collapsible-header" id="bagToggle" onclick="window.toggleBag()">
      <span class="collapsible-chevron">▼</span>
      <span class="collapsible-title">🎒 Bag</span>
    </div>
    <div class="collapsible-body" id="bagContent">
      <div class="bag-grid">
        <button class="bag-item" onclick="window.useItem('berries')" id="bagItemBerries">
          <span class="bag-item-icon">🫐</span>
          <span class="bag-item-name">Berries</span>
          <span class="count-badge" id="bagCountBerries">0</span>
        </button>
        <button class="bag-item" onclick="window.useItem('toys')" id="bagItemToys">
          <span class="bag-item-icon">🧸</span>
          <span class="bag-item-name">Toys</span>
          <span class="count-badge" id="bagCountToys">0</span>
        </button>
        <button class="bag-item" onclick="window.useItem('potions')" id="bagItemPotions">
          <span class="bag-item-icon">💊</span>
          <span class="bag-item-name">Potions</span>
          <span class="count-badge" id="bagCountPotions">0</span>
        </button>
        <button class="bag-item" onclick="window.useItem('candy')" id="bagItemCandy">
          <span class="bag-item-icon">🍬</span>
          <span class="bag-item-name">Candy</span>
          <span class="count-badge" id="bagCountCandy">0</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ─── DEMO BOOST SECTION (collapsible) ─── -->
  <div class="collapsible-section" id="demoSection">
    <div class="collapsible-header" id="demoToggle" onclick="window.toggleDemo()">
      <span class="collapsible-chevron">▼</span>
      <span class="collapsible-title">⚡ Demo Boost</span>
    </div>
    <div class="collapsible-body" id="demoContent">
      <!-- Row 1: Stats +10 -->
      <div class="demo-row">
        <button class="demo-btn" onclick="window.demoBoost('hunger', 10)">+Hunger</button>
        <button class="demo-btn" onclick="window.demoBoost('happiness', 10)">+Happiness</button>
        <button class="demo-btn" onclick="window.demoBoost('affection', 10)">+Affection</button>
      </div>
      <!-- Row 2: Progress -->
      <div class="demo-row">
        <button class="demo-btn" onclick="window.demoBoost('steps', 100)">+Steps (100)</button>
        <button class="demo-btn" onclick="window.demoBoost('caught', 1)">+Caught (1)</button>
        <button class="demo-btn" onclick="window.demoBoost('spin', 1)">+Spin (1)</button>
      </div>
      <!-- Row 3: Inventory -->
      <div class="demo-row">
        <button class="demo-btn" onclick="window.demoBoost('berry', 1)">+Berry</button>
        <button class="demo-btn" onclick="window.demoBoost('toy', 1)">+Toy</button>
        <button class="demo-btn" onclick="window.demoBoost('potion', 1)">+Potion</button>
      </div>
    </div>
  </div>

  <div class="footer">Pokégatchi · <kbd>D</kbd> debug</div>

</div><!-- end .ui-layer -->

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>

<!-- ─── LOADING SPINNER ─── -->
<div id="loading-spinner"></div>

<!-- ─── SHARED BACKDROP ─── -->
<div id="pgBackdrop" class="pg-backdrop" onclick="window.closeSettings();window.closeJournal();"></div>

<!-- ─── SETTINGS PANEL ─── -->
<div id="settingsPanel" class="pg-sheet" aria-hidden="true">
  <div class="pg-sheet-handle"></div>
  <div class="pg-sheet-header">
    <span class="pg-sheet-title">⚙️ Settings</span>
    <button class="pg-sheet-close" onclick="window.closeSettings()">✕</button>
  </div>
  <div class="pg-sheet-body">

    <div class="sett-section">
      <div class="sett-title">🎨 Team</div>
      <button class="sett-action-btn" onclick="window.closeSettings();const to=document.getElementById('teamOverlay');if(to){to.classList.remove('hidden');to.style.display='flex';}">Change Team Color</button>
    </div>

    <div class="sett-section">
      <div class="sett-title">🔊 Sound</div>
      <label class="tog-row"><span class="tog-label">Master Sound</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togSound" checked onchange="window.saveSetting('pg_sound',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Catch Sound</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togCatchSound" checked onchange="window.saveSetting('pg_sound_catch',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Spin Sound</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togSpinSound" checked onchange="window.saveSetting('pg_sound_spin',this.checked)"><span class="tog-pill"></span></span></label>
    </div>

    <div class="sett-section">
      <div class="sett-title">🎮 Game</div>
      <label class="tog-row"><span class="tog-label">PGP Mode</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togPgpMode" onchange="window.saveSetting('pg_mode_pgp',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Watch Sleep</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togWatchSleep" onchange="window.saveSetting('pg_watch_sleep',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Auto Catch</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togAutoCatch" checked onchange="window.saveSetting('pg_auto_catch',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Auto Spin</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togAutoSpin" checked onchange="window.saveSetting('pg_auto_spin',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Vibrate Alerts</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togVibrate" checked onchange="window.saveSetting('pg_vibrate',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Screen Effects</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togScreenFx" checked onchange="window.saveSetting('pg_screen_effects',this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Show Cameos</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togCameos" checked onchange="window.toggleCameos(this.checked)"><span class="tog-pill"></span></span></label>
      <label class="tog-row"><span class="tog-label">Bone Animations</span><span class="tog-wrap"><input type="checkbox" class="tog-input" id="togBoneAnim" checked onchange="window.toggleBoneAnim(this.checked)"><span class="tog-pill"></span></span></label>
    </div>

    <div class="sett-section">
      <div class="sett-title">⚠️ Reset</div>
      <button class="sett-reset-btn" id="resetBtn"
        onpointerdown="window.startReset()"
        onpointerup="window.cancelReset()"
        onpointerleave="window.cancelReset()">Hold 3s to Reset Progress</button>
      <div class="sett-reset-bar"><div class="sett-reset-fill" id="resetBarFill"></div></div>
    </div>
  </div>
</div>

<!-- ─── JOURNAL PANEL ─── -->
<div id="journalPanel" class="pg-sheet" aria-hidden="true">
  <div class="pg-sheet-handle"></div>
  <div class="pg-sheet-header">
    <span class="pg-sheet-title">📓 Journal</span>
    <span style="display:flex;gap:6px;align-items:center;">
      <button class="pg-sheet-clear" onclick="window.clearJournal()">Clear</button>
      <button class="pg-sheet-close" onclick="window.closeJournal()">✕</button>
    </span>
  </div>
  <div class="pg-jtabs">
    <button class="pg-jtab active" id="jtab-log"        onclick="window.switchJTab('log')">📋 Log</button>
    <button class="pg-jtab"        id="jtab-today"      onclick="window.switchJTab('today')">📊 Today</button>
    <button class="pg-jtab"        id="jtab-milestones" onclick="window.switchJTab('milestones')">🏆 Goals</button>
  </div>
  <div class="pg-sheet-body" id="journalBody">
    <!-- rendered by JS -->
  </div>
</div>

<!-- Cache-buster v=13 -->
<script type="module" src="js/main.js?v=20"></script>
</body>
</html>
