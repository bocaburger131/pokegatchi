<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokégatchi — Production</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root {
            --bg: #000000;
            --mg: #00FF66;
            --mg-dim: rgba(0,255,102,0.15);
            --wr: #FF3333;
            --text: #FFFFFF;
            --text-dim: #888;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
        }
        #game-container {
            width: 100%;
            max-width: 420px;
            height: 100%;
            max-height: 420px;
            position: relative;
            background: #111;
            border: 2px solid #333;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,255,102,0.05);
        }

        /* ── 2.5D LAYERS ── */
        #layer-2d-background {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 1;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease;
        }
        #layer-2d-cameos {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        #layer-3d-buddy {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 3;
            display: flex; align-items: center; justify-content: center;
        }
        #layer-3d-buddy canvas {
            width: 320px !important; height: 320px !important;
        }
        #expressionCanvas {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px; height: 320px;
            z-index: 4;
            pointer-events: none;
        }
        #layer-ui {
            position: absolute; inset: 0; width: 100%; height: 100%;
            z-index: 5;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            pointer-events: none;
        }
        .interactive { pointer-events: auto; }

        /* ── HUD ── */
        .hud-row {
            display: flex; justify-content: space-between; width: 100%;
        }
        .stat-badge {
            background: rgba(0,0,0,0.75);
            padding: 4px 8px; border-radius: 8px;
            font-size: 11px;
            border: 1px solid #444;
            color: var(--mg);
        }
        .stat-badge.alert { color: var(--wr); border-color: var(--wr); }
        .pet-info {
            display: flex; flex-direction: column; align-items: center;
            margin-top: 8px;
        }
        .pet-name {
            font-size: 16px; font-weight: bold; color: var(--mg);
            text-shadow: 0 0 10px rgba(0,255,102,0.3);
        }
        .pet-species { font-size: 11px; color: var(--text-dim); }
        .hud-status {
            background: rgba(0,0,0,0.5);
            padding: 3px 10px; border-radius: 6px;
            font-size: 10px; color: var(--mg);
            text-align: center;
            letter-spacing: 1px;
        }
        .hud-counter {
            display: flex; gap: 8px; align-items: center;
        }
        .stage-badge {
            background: rgba(0,255,102,0.1);
            border: 1px solid var(--mg);
            color: var(--mg);
            padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: bold;
        }

        /* ── ACTION TRAY ── */
        .action-tray {
            display: flex; justify-content: space-around; width: 100%;
            margin-bottom: 4px;
        }
        .btn-action {
            background: #222;
            border: 1px solid var(--mg);
            color: white;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .btn-action:active { background: var(--mg); color: black; }
        .btn-action:disabled { opacity: 0.3; border-color: #444; pointer-events: none; }

        /* ── LINE PICKER ── */
        #linePicker {
            display: flex; gap: 4px; flex-wrap: wrap;
            justify-content: center;
            margin-top: 4px;
        }
        #linePicker button {
            background: #222;
            border: 1px solid #444;
            color: var(--text-dim);
            padding: 3px 8px;
            font-family: inherit;
            font-size: 9px;
            cursor: pointer;
            border-radius: 6px;
        }
        #linePicker button.active {
            border-color: var(--mg);
            color: var(--mg);
            background: rgba(0,255,102,0.1);
        }
        #linePicker button:active { background: rgba(0,255,102,0.2); }

        /* ── WAKE-UP OVERLAY ── */
        #ledger-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }
        .ledger-box {
            border: 2px dashed var(--mg);
            padding: 16px;
            width: 100%;
            margin: 16px 0;
            font-size: 12px;
            line-height: 1.8;
        }
        .ledger-box div { margin: 4px 0; }
        .ledger-rewards { color: #FFD700; }

        /* ── LOADING SPINNER ── */
        #loading-spinner {
            position: absolute;
            top: 45%; left: 45%;
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid var(--mg);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 6;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 440px) {
            #game-container { border-radius: 24px; max-height: 100vh; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 2.5D LAYERS -->
        <div id="layer-2d-background"></div>
        <div id="layer-2d-cameos"></div>
        <div id="layer-3d-buddy"></div>
        <canvas id="expressionCanvas" width="320" height="320"></canvas>
        <div id="loading-spinner"></div>

        <!-- UI LAYER -->
        <div id="layer-ui">
            <!-- Top HUD -->
            <div class="hud-row">
                <div class="hud-counter">
                    <span class="stage-badge" id="petStage">EGG</span>
                </div>
                <div class="hud-counter">
                    <div id="hud-hunger" class="stat-badge">HG: 100%</div>
                    <div id="hud-boredom" class="stat-badge">BD: 0%</div>
                </div>
            </div>

            <!-- Pet Info -->
            <div class="pet-info">
                <div class="pet-name" id="petName">—</div>
                <div class="pet-species" id="petSpecies">Wake up...</div>
            </div>

            <!-- Status -->
            <div style="display:flex;justify-content:center;margin:4px 0;">
                <div id="hud-status" class="hud-status">• WAKE UP •</div>
            </div>

            <!-- Action Tray -->
            <div class="action-tray interactive">
                <button class="btn-action" onclick="window.handleFeedClick()">FEED (<span id="inv-berries">0</span>)</button>
                <button class="btn-action" onclick="window.handlePlayClick()">PLAY (<span id="inv-toys">0</span>)</button>
                <button class="btn-action" onclick="window.handleCleanClick()">CLEAN</button>
                <button class="btn-action" onclick="window.handleHatchClick()">HATCH</button>
            </div>

            <!-- Line Picker -->
            <div id="linePicker" class="interactive"></div>
        </div>

        <!-- WAKE-UP LEDGER OVERLAY -->
        <div id="ledger-overlay" class="interactive">
            <h3 style="color:var(--mg);margin-bottom:8px;">⚡ CATCHER SYNC</h3>
            <p style="font-size:11px;color:var(--text-dim);">Catcher data detected from last session</p>
            <div class="ledger-box">
                <div id="ledger-spins">STOPS DETECTED: 0</div>
                <div id="ledger-catches">CAPTURES SUCCESS: 0</div>
                <hr style="border-color:#333;margin:8px 0;">
                <div id="ledger-rewards" class="ledger-rewards">UNLOCKED: None</div>
            </div>
            <button class="btn-action" onclick="window.dismissLedger()">⬡ SYNC DATA</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
